name: DavkarApp
description: eDavki XML generator za slovensko davčno napoved iz spletnih brokerjev
version: 1.0.0+1
publish_to: none
 
environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"
 
dependencies:
  flutter:
    sdk: flutter
  spreadsheet_decoder: ^2.2.0
  xml: ^6.5.0
  http: ^1.2.0
  file_picker: ^5.5.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  collection: ^1.18.0
 
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
 
flutter:
  uses-material-design: true